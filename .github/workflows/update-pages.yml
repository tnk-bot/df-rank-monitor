name: Update leaderboard report

on:
  workflow_dispatch:
  schedule:
    # 抓取窗口：北京时间 18:30–24:00（UTC+8）每 5 分钟一次。
    # UTC 时刻换算：18:30–18:55 BJ = UTC 10:30–10:55；
    # 19:00–23:55 BJ = UTC 11:00–15:55；
    # 24:00 BJ = UTC 16:00（次日的 00:00 BJ 之前最后一刻）。
    - cron: "30-55/5 10 * * *"
    - cron: "*/5 11-15 * * *"
    - cron: "0 16 * * *"

permissions:
  contents: write

concurrency:
  group: df-rank-monitor
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate report
        run: |
          mkdir -p docs data
          python3 df_rank_monitor.py once --pages 0 --data-dir data --output docs/index.html
          touch docs/.nojekyll

      - name: Commit updated report and history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/.nojekyll data/rank_history.sqlite3
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update leaderboard report"
            git push
          fi
