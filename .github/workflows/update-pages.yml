name: Update and deploy leaderboard report

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: df-rank-monitor
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate report
        run: |
          mkdir -p docs data
          python3 df_rank_monitor.py once --pages 5 --data-dir data --output docs/index.html
          touch docs/.nojekyll

      - name: Commit updated report and history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/.nojekyll data/rank_history.sqlite3
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update leaderboard report"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
