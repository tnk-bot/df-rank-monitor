name: Update leaderboard report

on:
  workflow_dispatch:
  # 接收外部调度信号：curl -X POST -H "Authorization: Bearer ***  .../actions/workflows/.../dispatches
  # {"ref":"main","inputs":{"client":"cron"}}
  repository_dispatch:
    types: [tick]

permissions:
  contents: write

concurrency:
  group: df-rank-monitor
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate report
        run: |
          mkdir -p docs data
          python3 df_rank_monitor.py once --pages 0 --competition-id 0 --data-dir data --output docs/index.html
          touch docs/.nojekyll

      - name: Commit updated report and history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/.nojekyll data/rank_history.sqlite3
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update leaderboard report"
            git push
          fi
